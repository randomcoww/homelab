---
variant: fcos
version: ${butane_version}
systemd:
  units:
    - name: chronyd.service
      enabled: true
    # enable trim on all disks
    - name: fstrim.service
      enabled: true
      dropins:
        - name: 10-all.conf
          contents: |
            [Service]
            ExecStart=
            ExecStart=/usr/sbin/fstrim --all --verbose --quiet
    - name: systemd-network-generator.service
      mask: true
    - name: systemd-resolved.service
      enabled: true
    # configure nftables for each service
    - name: nftables.service
      mask: false
    - name: nftables@.service
      enabled: true
      contents: |
        [Unit]
        Wants=network-pre.target
        Before=network-pre.target
        ConditionFileNotEmpty=/etc/nftables/%i.nft

        [Service]
        Type=oneshot
        ProtectSystem=full
        ProtectHome=true
        ExecStart=/sbin/nft -f /etc/nftables/%i.nft
        ExecReload=/sbin/nft 'delete table inet %i; include "/etc/nftables/%i.nft";'
        ExecStop=/sbin/nft delete table inet %i
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

    # does not work with read only system
    - name: rpm-ostree-fix-shadow-mode.service
      mask: true
    - name: terraform-runtime-config.service
      enabled: true

storage:
  files:
    - path: /etc/hostname
      mode: 0644
      contents:
        inline:
          ${hostname}

    - path: /etc/systemd/resolved.conf.d/10-base.conf
      mode: 0644
      contents:
        inline: |
          [Resolve]
          DNSStubListener=false
          MulticastDNS=false
          LLMNR=false
    # Block password SSH #
    - path: /etc/ssh/sshd_config.d/10-block-password.conf
      mode: 0644
      contents:
        inline: |
          PasswordAuthentication no
    # Systemd for live image #
    - path: /etc/systemd/journald.conf.d/10-live-boot-config.conf
      mode: 0644
      contents:
        inline: |
          [Journal]
          Storage=volatile
          RuntimeMaxUse=10M
          SystemMaxUse=10M
          SystemMaxFileSize=10M
          ForwardToSyslog=false
          ForwardToConsole=false
    - path: /etc/systemd/system.conf.d/10-live-boot-config.conf
      mode: 0644
      contents:
        inline: |
          [Manager]
          DumpCore=false
    # Disable speaker #
    - path: /etc/modprobe.d/10-blacklist-pcspk.conf
      mode: 0644
      contents:
        inline: |
          blacklist pcspkr
          blacklist snd_pcsp
    # DNS reply from unexpected source #
    - path: /etc/modules-load.d/20-dns-reply.conf
      mode: 0644
      contents:
        inline: |
          br_netfilter
    # Image build #
    - path: /etc/modules-load.d/20-uinput.conf
      mode: 0644
      contents:
        inline: |
          uinput
    # common #
    - path: /etc/sysctl.d/10-common.conf
      mode: 0644
      contents:
        inline: |
          kernel.printk=4
          fs.inotify.max_user_watches=524288
    # sudoers #
    - path: /etc/sudoers.d/coreos-sudo-group
      overwrite: true
      mode: 0600
      contents:
        inline: |
          %sudo ALL=(ALL) NOPASSWD: ALL
    # This restarts until successful. Restart is handled in the pod definition and systemd service will not exit until successful
    - path: ${quadlet_path}/terraform-runtime-config.kube
      mode: 0600
      contents:
        inline: |
          [Unit]
          Wants=network-online.target
          After=network-online.target
          RequiredBy=kubelet.service
          Before=kubelet.service
          PropagatesReloadTo=kubelet.service
          RequiredBy=sshd.service
          Before=sshd.service
          PropagatesReloadTo=sshd.service

          [Service]
          Type=oneshot
          Restart=never

          [Kube]
          PodmanArgs="--wait"
          ExitCodePropagation=any
          ConfigMap=terraform-credentials.yaml
          Yaml=terraform-runtime-config.yaml

          [Install]
          WantedBy=multi-user.target
  # manually enable quadlet
  links:
    - path: /etc/systemd/system/multi-user.target.wants/terraform-runtime-config.kube
      target: ${quadlet_path}/terraform-runtime-config.kube